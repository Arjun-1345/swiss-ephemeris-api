<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kundali Prediction</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Karla:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --ink:        #0d0f24;
    --panel:      #14172f;
    --panel-2:    #1b1f3d;
    --hairline:   rgba(201, 162, 92, 0.28);
    --gold:       #c9a25c;
    --gold-bright:#e4c684;
    --vermillion: #b5502d;
    --ivory:      #ede7d8;
    --muted:      #9298b8;
    --radius:     4px;
  }

  * { box-sizing: border-box; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }

  html, body {
    height: 100%;
  }

  body {
    margin: 0;
    padding: 48px 20px;
    min-height: 100vh;
    font-family: 'Karla', sans-serif;
    color: var(--ivory);
    background: var(--ink);
    background-image:
      radial-gradient(1px 1px at 8% 15%, rgba(237,231,216,0.55) 0, transparent 100%),
      radial-gradient(1px 1px at 22% 68%, rgba(237,231,216,0.4) 0, transparent 100%),
      radial-gradient(1.5px 1.5px at 40% 30%, rgba(237,231,216,0.5) 0, transparent 100%),
      radial-gradient(1px 1px at 60% 80%, rgba(237,231,216,0.35) 0, transparent 100%),
      radial-gradient(1.5px 1.5px at 78% 20%, rgba(237,231,216,0.5) 0, transparent 100%),
      radial-gradient(1px 1px at 88% 55%, rgba(237,231,216,0.4) 0, transparent 100%),
      radial-gradient(1px 1px at 95% 90%, rgba(237,231,216,0.3) 0, transparent 100%),
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(181,80,45,0.10), transparent 70%);
    background-repeat: no-repeat;
    background-size: cover;
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }

  .stage {
    position: relative;
    width: 100%;
    max-width: 560px;
  }

  .card {
    position: relative;
    z-index: 1;
    background: linear-gradient(180deg, var(--panel), var(--panel-2));
    border: 1px solid var(--hairline);
    border-top: 2px solid var(--gold);
    border-radius: var(--radius);
    padding: 44px 40px 36px;
    box-shadow:
      0 30px 60px -20px rgba(0,0,0,0.6),
      0 0 0 1px rgba(0,0,0,0.2);
  }

  .eyebrow {
    text-align: center;
    font-family: 'Karla', sans-serif;
    font-size: 12px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--gold);
    margin: 0 0 6px;
  }

  .devanagari {
    display: block;
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 16px;
    color: var(--muted);
    letter-spacing: 0.04em;
    margin-bottom: 18px;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 40px;
    text-align: center;
    letter-spacing: 0.01em;
    margin: 0 0 6px;
    color: var(--ivory);
  }

  .sub {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    margin: 0 0 34px;
    line-height: 1.6;
  }

  .field {
    margin-top: 20px;
  }

  label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
    font-weight: 600;
  }

  input {
    width: 100%;
    padding: 13px 14px;
    background: rgba(0,0,0,0.22);
    border: 1px solid rgba(201, 162, 92, 0.25);
    border-radius: var(--radius);
    color: var(--ivory);
    font-family: 'Karla', sans-serif;
    font-size: 15px;
    transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
  }

  input::placeholder {
    color: rgba(146, 152, 184, 0.6);
  }

  input:hover {
    border-color: rgba(201, 162, 92, 0.45);
  }

  input:focus {
    outline: none;
    border-color: var(--gold);
    background: rgba(0,0,0,0.32);
    box-shadow: 0 0 0 3px rgba(201, 162, 92, 0.18);
  }

  /* consistent calendar/clock icon color on dark bg */
  input[type="date"]::-webkit-calendar-picker-indicator,
  input[type="time"]::-webkit-calendar-picker-indicator {
    filter: invert(0.8) sepia(1) saturate(2) hue-rotate(0deg);
    cursor: pointer;
    opacity: 0.85;
  }

  button {
    width: 100%;
    padding: 15px;
    margin-top: 30px;
    border: none;
    border-radius: var(--radius);
    background: linear-gradient(180deg, var(--gold-bright), var(--gold));
    color: #221807;
    font-family: 'Karla', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.2s ease, filter 0.15s ease;
  }

  button:hover {
    filter: brightness(1.06);
    box-shadow: 0 8px 24px -8px rgba(201, 162, 92, 0.55);
  }

  button:active {
    transform: translateY(1px);
  }

  button:focus-visible,
  input:focus-visible {
    outline: 2px solid var(--gold-bright);
    outline-offset: 2px;
  }

  button:disabled {
    opacity: 0.6;
    cursor: progress;
    filter: none;
    box-shadow: none;
  }

  #result-wrap {
    margin-top: 8px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
  }

  #result-wrap.open {
    margin-top: 30px;
    max-height: 2000px;
  }

  #result {
    border-left: 2px solid var(--gold);
    padding: 4px 0 4px 20px;
    white-space: pre-wrap;
    line-height: 1.75;
    font-size: 15px;
    color: var(--ivory);
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.4s ease 0.05s, transform 0.4s ease 0.05s;
  }

  #result-wrap.open #result {
    opacity: 1;
    transform: translateY(0);
  }

  #result.pending {
    color: var(--muted);
    font-style: italic;
  }

  #result.error {
    border-left-color: var(--vermillion);
    color: #e3a48e;
  }

  footer.note {
    text-align: center;
    margin-top: 26px;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.02em;
  }

  @media (max-width: 480px) {
    .card { padding: 34px 24px 28px; }
    h1 { font-size: 32px; }
  }
</style>
</head>

<body>

<div class="stage">

  <div class="card">

    <p class="eyebrow">Vedic Chart Reading</p>
    <span class="devanagari">जन्म कुण्डली</span>

    <h1>Kundali Prediction</h1>
    <p class="sub">Enter your birth details exactly as recorded — the chart is calculated from the precise moment and place of birth.</p>

    <div class="field">
      <label for="date">Date of Birth</label>
      <input type="date" id="date">
    </div>

    <div class="field">
      <label for="time">Time of Birth</label>
      <input type="time" id="time" step="1">
    </div>

    <div class="field">
      <label for="location">Birthplace</label>
      <input type="text" id="location" placeholder="Example: Noida, Uttar Pradesh, India">
    </div>

    <button id="submit-btn" onclick="generatePrediction()">Generate Prediction</button>

    <div id="result-wrap">
      <div id="result"></div>
    </div>

  </div>
</div>

<script>
async function generatePrediction() {
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;
  const location = document.getElementById("location").value;

  const wrap = document.getElementById("result-wrap");
  const result = document.getElementById("result");
  const btn = document.getElementById("submit-btn");

  result.classList.remove("error", "pending");

  if (!date || !time || !location) {
    result.textContent = "Please fill in all fields.";
    result.classList.add("error");
    wrap.classList.add("open");
    return;
  }

  btn.disabled = true;
  btn.textContent = "Reading the sky…";
  result.classList.add("pending");
  result.textContent = "Generating your Kundali prediction…";
  wrap.classList.add("open");

  try {
    const params = new URLSearchParams({ date, time, location });

    const response = await fetch(`/kundali-prediction?${params.toString()}`, {
      method: "POST"
    });

    const data = await response.json();

    result.classList.remove("pending");

    if (!response.ok) {
      result.classList.add("error");
      result.textContent = data.detail || "Unable to generate prediction.";
      return;
    }

    result.textContent = data.prediction || JSON.stringify(data, null, 2);

  } catch (error) {
    result.classList.remove("pending");
    result.classList.add("error");
    result.textContent = "Something went wrong while generating the prediction.";
    console.error(error);
  } finally {
    btn.disabled = false;
    btn.textContent = "Generate Prediction";
  }
}
</script>

</body>
</html>
